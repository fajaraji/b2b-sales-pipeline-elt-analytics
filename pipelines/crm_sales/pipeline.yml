# Bruin pipeline definition for the B2B sales pipeline analytics workflow
# Define pipeline tasks, schedule, and asset references here.

pipeline:
  name: b2b-sales-pipeline
  schedule: '@daily'
  tasks:
    - name: extract
      type: python
      asset: extract_data.py
    - name: transform
      type: sql
      asset: transform_staging.sql
    - name: load
      type: python
      asset: load_to_bq.py
